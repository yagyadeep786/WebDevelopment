<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Practice</title>
    <style>
        .container{
            display: grid;
            grid-template-columns: 15rem auto;
            grid-template-rows: 50px auto 50px;
            gap: 10px;
        }
        .item{
            background-color: gray;
        }
        .header{
            grid-column-start: 1;
            grid-column-end: 3;
        }
        .aside{
            grid-row:2/4;
            height: 300vh;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item header">Header</div>
        <div class="item aside">Nav</div>
        <div class="item main">Main Contact</div>
        <div class="item footer">Footer</div>
    </div>
</body>
</html>
